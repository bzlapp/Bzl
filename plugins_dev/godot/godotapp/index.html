<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Godot App Template</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: system-ui, sans-serif;
        background: #0b0d12;
        color: #e8ecf6;
      }
      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 18px;
        max-width: 760px;
        background: rgba(255, 255, 255, 0.04);
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Godot Template Ready</h1>
        <p>Replace this file with your Godot HTML5 export entry file.</p>
        <p>Copy all export assets into this folder: <code>godotapp/</code></p>
        <p>Expected entry path in Bzl: <code>/plugins/godot/godotapp/index.html</code></p>
      </div>
    </div>
    <script>
      window.parent?.postMessage?.(
        {
          type: "bzl.godot.v1",
          event: "ready",
          payload: { status: "template" }
        },
        "*"
      );
    </script>
  </body>
</html>
